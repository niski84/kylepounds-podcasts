title: "Rome · The Historians Who Watched It Rise and Fall"
description: "Kyle Pounds assembled one of the most complete archives of Roman primary sources outside a university library — Gibbon’s full six-volume Decline and Fall, Cassius Dio’s eyewitness History of Rome, Julius Caesar’s own dispatches from the field, Florus’ compact Roman History, and Eutropius’ Breviarium. This episode digs into that archive: real events, real people, real consequences — the Republic’s collapse, Caesar’s campaigns, and the long unraveling that Gibbon spent a lifetime documenting. Surfaced from kylepounds.com."
